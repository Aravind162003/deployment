apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  namespace: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: aravind80555/shop-frontend:v16
          ports:
            - containerPort: 3000
          imagePullPolicy: Always
